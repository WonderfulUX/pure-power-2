<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        *,::after,::before{
            margin: 0;
            padding: 0;
        }
        .box{
            background: red;
            width:200px;
            height: 200px;
            margin-bottom: 20px;
        }
        body{
            /* height: 100vh; */
            width: 100%;
            position: relative;
        }
        #container{
            width: 100%;
            position: relative;
        }
        button{
            position: fixed;
            top: 5px;
            right: 5px;
            z-index: 10;
        }
        .grind{
            columns: 390px;
            gap: 50px;
            width: 95%;
            margin: auto;
        }
        img{
            width: 100%;
            height: auto;
            margin-bottom: 50px;
        }
        .grind img{
            cursor: pointer;
        }
        #expander{
            width: 0;
            height: 0;
            overflow: hidden;
            position: fixed;
            top: 0;
            will-change: translate;
            background: white;
        }
        #expanderImg{
            position: absolute;
            top: 0;
            /* left: 0; */
            height: 100%;
            width: 50%;
            object-fit: cover;
        }
    </style>
</head>
<body>
    <div id="container">
        <div class="box"></div>
        <div class="grind">
            <img src="m1.jpg" alt="">
            <img src="m2.jpg" alt="">
            <img src="product-c1.jpg" alt="">
            <img src="product1.webp" alt="">
            <img src="product2.webp" alt="">
            <img src="product3.webp" alt="">
            <img src="product4.webp" alt="">
            <img src="product5.webp" alt="">
            <img src="w1.webp" alt="">
        </div>

    </div>
    
    <script src="index.js" type="module"></script>
</body>
</html>
